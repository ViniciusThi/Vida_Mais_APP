# Redireciona HTTP → HTTPS
server {
  listen 80;
  server_name vidamais-app.com www.vidamais-app.com;
  return 301 https://vidamais-app.com$request_uri;
}

# HTTPS principal
server {
  listen 443 ssl;
  server_name vidamais-app.com www.vidamais-app.com;

  ssl_certificate     /etc/letsencrypt/live/vidamais-app.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/vidamais-app.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy do backend via /api
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://backend:3000/;
  }

  # SPA fallback (React Router)
  location / {
    try_files $uri $uri/ /index.html;
  }
}

